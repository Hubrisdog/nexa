# fly.toml app configuration file generated by antigravity

app = "nexa-xz41oq"
primary_region = "bos"

[build]
  [build.args]
    NODE_VERSION = "20"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[env]
  APP_ENV = "production"
  APP_DEBUG = "false"
  DB_CONNECTION = "sqlite"
  DB_DATABASE = "/data/database.sqlite"
  LOG_CHANNEL = "stderr"
  SESSION_DRIVER = "cookie"
  CACHE_DRIVER = "file"

[mounts]
  source = "nexa_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
